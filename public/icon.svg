<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <radialGradient id="rootAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="midAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="leafAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle inner border glow -->
  <rect width="512" height="512" rx="96" fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.12"/>

  <!-- === Connector lines (below nodes) === -->

  <!-- Root → Left mid -->
  <line x1="256" y1="374" x2="150" y2="262"
        stroke="#4ade80" stroke-width="16" stroke-linecap="round" opacity="0.45"/>
  <!-- Root → Right mid -->
  <line x1="256" y1="374" x2="362" y2="262"
        stroke="#4ade80" stroke-width="16" stroke-linecap="round" opacity="0.45"/>

  <!-- Left mid → leaf LL -->
  <line x1="150" y1="262" x2="94" y2="152"
        stroke="#22d3ee" stroke-width="11" stroke-linecap="round" opacity="0.38"/>
  <!-- Left mid → leaf LR -->
  <line x1="150" y1="262" x2="210" y2="152"
        stroke="#22d3ee" stroke-width="11" stroke-linecap="round" opacity="0.38"/>
  <!-- Right mid → leaf RL -->
  <line x1="362" y1="262" x2="302" y2="152"
        stroke="#22d3ee" stroke-width="11" stroke-linecap="round" opacity="0.38"/>
  <!-- Right mid → leaf RR -->
  <line x1="362" y1="262" x2="418" y2="152"
        stroke="#22d3ee" stroke-width="11" stroke-linecap="round" opacity="0.38"/>

  <!-- === Root node === -->
  <circle cx="256" cy="388" r="68" fill="url(#rootAura)"/>
  <circle cx="256" cy="388" r="38" fill="#4ade80"/>
  <circle cx="256" cy="388" r="22" fill="#bbf7d0"/>

  <!-- === Level 2 nodes === -->
  <!-- Left -->
  <circle cx="150" cy="262" r="50" fill="url(#midAura)"/>
  <circle cx="150" cy="262" r="29" fill="#34d399"/>
  <circle cx="150" cy="262" r="15" fill="#a7f3d0"/>
  <!-- Right -->
  <circle cx="362" cy="262" r="50" fill="url(#midAura)"/>
  <circle cx="362" cy="262" r="29" fill="#34d399"/>
  <circle cx="362" cy="262" r="15" fill="#a7f3d0"/>

  <!-- === Leaf nodes === -->
  <!-- LL -->
  <circle cx="94" cy="148" r="36" fill="url(#leafAura)"/>
  <circle cx="94" cy="148" r="21" fill="#22d3ee"/>
  <circle cx="94" cy="148" r="11" fill="#a5f3fc"/>
  <!-- LR -->
  <circle cx="210" cy="148" r="36" fill="url(#leafAura)"/>
  <circle cx="210" cy="148" r="21" fill="#22d3ee"/>
  <circle cx="210" cy="148" r="11" fill="#a5f3fc"/>
  <!-- RL -->
  <circle cx="302" cy="148" r="36" fill="url(#leafAura)"/>
  <circle cx="302" cy="148" r="21" fill="#22d3ee"/>
  <circle cx="302" cy="148" r="11" fill="#a5f3fc"/>
  <!-- RR -->
  <circle cx="418" cy="148" r="36" fill="url(#leafAura)"/>
  <circle cx="418" cy="148" r="21" fill="#22d3ee"/>
  <circle cx="418" cy="148" r="11" fill="#a5f3fc"/>
</svg>
